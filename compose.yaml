name: output-pulse

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: output_pulse
      POSTGRES_PASSWORD: output_pulse
      POSTGRES_USER: output_pulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U output_pulse -d output_pulse"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  postgres_data:
